name: Build and Test

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build:
        name: Build and Test (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up GraalVM JDK 25
              uses: graalvm/setup-graalvm@v1
              with:
                  java-version: "25"
                  distribution: "graalvm"
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  cache: "maven"

            - name: Build and Test with Maven
              shell: bash
              run: ./mvnw clean test

            - name: Build Native CLI Executable
              shell: bash
              run: ./mvnw package -Pnative -pl adf4j-cli -am -DskipTests

            - name: Prepare native executable artifact
              shell: bash
              run: |
                  mkdir -p dist
                  if [ -f adf4j-cli/target/adf4j-cli.exe ]; then
                    cp adf4j-cli/target/adf4j-cli.exe dist/adf4j-cli-windows.exe
                  elif [ -f adf4j-cli/target/adf4j-cli ]; then
                    if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
                      cp adf4j-cli/target/adf4j-cli dist/adf4j-cli-macos
                    else
                      cp adf4j-cli/target/adf4j-cli dist/adf4j-cli-linux
                    fi
                  else
                    echo "Executable not found!"
                    exit 1
                  fi

            - name: Upload Native Executable
              uses: actions/upload-artifact@v4
              with:
                  name: adf4j-cli-${{ matrix.os }}
                  path: dist/*
                  if-no-files-found: error
