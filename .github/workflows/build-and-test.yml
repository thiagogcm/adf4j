name: Build and Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so Spotless `ratchetFrom origin/main` can diff against the base.
          fetch-depth: 0

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@809afe62741147990fbf405045cd15e61bffedfe # v1.5.5
        with:
          java-version: "25"
          distribution: "graalvm"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: "1.53.0"

      - name: Build and test
        shell: bash
        # `just verify` runs the tests, produces the JaCoCo report, and enforces the coverage gate.
        run: just verify

      - name: Build native CLI executable
        shell: bash
        run: just native

      - name: Prepare native executable artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ -f adf4j-cli/target/adf4j-cli.exe ]; then
            cp adf4j-cli/target/adf4j-cli.exe dist/adf4j-cli-windows.exe
          elif [ -f adf4j-cli/target/adf4j-cli ]; then
            if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
              cp adf4j-cli/target/adf4j-cli dist/adf4j-cli-macos
            else
              cp adf4j-cli/target/adf4j-cli dist/adf4j-cli-linux
            fi
          else
            echo "Executable not found!"
            exit 1
          fi

      - name: Upload Native Executable
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: adf4j-cli-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  build-wasm:
    name: Build WASM (Web Image)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@809afe62741147990fbf405045cd15e61bffedfe # v1.5.5
        with:
          java-version: "25"
          distribution: "graalvm"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"
          native-image-job-reports: "true"

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: "1.53.0"

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Verify Native Image installation
        run: native-image --version

      # GraalVM's WASM backend needs `wasm-as` from Binaryen >= 119; Ubuntu's apt build is older.
      - name: Install Binaryen (wasm-as)
        shell: bash
        run: |
          BINARYEN=version_130
          curl -fsSL -o /tmp/binaryen.tar.gz \
            "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN}/binaryen-${BINARYEN}-x86_64-linux.tar.gz"
          tar -xzf /tmp/binaryen.tar.gz -C /tmp
          echo "/tmp/binaryen-${BINARYEN}/bin" >> "$GITHUB_PATH"
          /tmp/binaryen-${BINARYEN}/bin/wasm-as --version

      - name: Build WASM (web image)
        run: just wasm

      # Prove the wasm actually converts: load it from Node and run the smoke test.
      - name: Smoke-test the wasm from Node
        run: just wasm-smoke

      # Assemble the npm package (resolving the Maven version) and verify the cross-runtime/bundler
      # contract: exports map, declared files, Vite plugin, conversion.
      - name: Assemble and verify npm package
        shell: bash
        run: |
          just wasm-npm
          npm pack dist/npm/adf4j-wasm --dry-run

      - name: Build Chrome extension
        run: just chrome-ext-from-dist

      - name: Prepare WASM artifact
        run: |
          mkdir -p dist
          cp adf4j-wasm/target/adf4j-wasm.js dist/adf4j-wasm.js
          cp adf4j-wasm/target/adf4j-wasm.js.wasm dist/adf4j-wasm.js.wasm

      - name: Upload WASM Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: adf4j-wasm
          path: |
            dist/adf4j-wasm.js
            dist/adf4j-wasm.js.wasm
          if-no-files-found: error
