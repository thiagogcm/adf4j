name: Build and Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1.5.3
        with:
          java-version: "25"
          distribution: "graalvm"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"

      - name: Build and Test with Maven
        shell: bash
        # `verify` runs the tests, produces the JaCoCo report, and enforces the coverage gate
        # (jacoco:check); `test` stops short of all three.
        run: ./mvnw clean verify

      - name: Build Native CLI Executable
        shell: bash
        run: ./mvnw package -Pnative -pl adf4j-cli -am -DskipTests

      - name: Prepare native executable artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ -f adf4j-cli/target/adf4j-cli.exe ]; then
            cp adf4j-cli/target/adf4j-cli.exe dist/adf4j-cli-windows.exe
          elif [ -f adf4j-cli/target/adf4j-cli ]; then
            if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
              cp adf4j-cli/target/adf4j-cli dist/adf4j-cli-macos
            else
              cp adf4j-cli/target/adf4j-cli dist/adf4j-cli-linux
            fi
          else
            echo "Executable not found!"
            exit 1
          fi

      - name: Upload Native Executable
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: adf4j-cli-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  build-wasm:
    name: Build WASM (Web Image)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1.5.3
        with:
          java-version: "25"
          distribution: "graalvm"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"
          native-image-job-reports: "true"

      - name: Verify Native Image installation
        run: native-image --version

      # GraalVM's WASM backend needs `wasm-as` from Binaryen >= 119; Ubuntu's apt build is older.
      - name: Install Binaryen (wasm-as)
        shell: bash
        run: |
          BINARYEN=version_130
          curl -fsSL -o /tmp/binaryen.tar.gz \
            "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN}/binaryen-${BINARYEN}-x86_64-linux.tar.gz"
          tar -xzf /tmp/binaryen.tar.gz -C /tmp
          echo "/tmp/binaryen-${BINARYEN}/bin" >> "$GITHUB_PATH"
          /tmp/binaryen-${BINARYEN}/bin/wasm-as --version

      - name: Build WASM (web image)
        run: ./mvnw package -Pwasm -pl adf4j-wasm -am -DskipTests

      # Prove the wasm actually converts: load it from Node and run the smoke test.
      # ubuntu-latest ships a current Node; the harness needs only ESM + top-level await.
      - name: Smoke-test the wasm from Node
        run: node adf4j-wasm/src/test/js/test.mjs

      - name: Prepare WASM artifact
        run: |
          mkdir -p dist
          cp adf4j-wasm/target/adf4j-wasm.js dist/adf4j-wasm.js
          cp adf4j-wasm/target/adf4j-wasm.js.wasm dist/adf4j-wasm.js.wasm

      - name: Upload WASM Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: adf4j-wasm
          path: dist/*
          if-no-files-found: error
