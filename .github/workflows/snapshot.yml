name: Publish snapshot

# Publishes the library to the Maven Central snapshots repo when it changes on main (and on demand).
# Library only — no CLI, no GitHub release. Self-skips unless the POM version is a -SNAPSHOT.
# Requires the same secrets as a release (see RELEASE.md).

on:
  push:
    branches: ["main"]
    paths:
      - "adf4j-lib/**"
      - "pom.xml"
      - ".github/workflows/snapshot.yml"
      - "jreleaser.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    name: Publish library snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1.5.3
        with:
          java-version: "25"
          distribution: "graalvm"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"

      - name: Resolve version
        id: v
        shell: bash
        run: |
          VERSION=$(./mvnw -q -ntp -pl adf4j-lib help:evaluate -Dexpression=project.version -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          case "$VERSION" in
            *-SNAPSHOT) echo "is_snapshot=true"  >> "$GITHUB_OUTPUT"; echo "Publishing snapshot $VERSION" ;;
            *)          echo "is_snapshot=false" >> "$GITHUB_OUTPUT"; echo "::notice::$VERSION is not a -SNAPSHOT; skipping." ;;
          esac

      - name: Stage library
        if: steps.v.outputs.is_snapshot == 'true'
        run: ./mvnw -B -ntp -Ppublication -pl adf4j-lib -DskipTests clean deploy

      - name: Run JReleaser (deploy snapshot)
        if: steps.v.outputs.is_snapshot == 'true'
        uses: jreleaser/release-action@90ac653bb9c79d11179e65d81499f3f34527dcd5 # 2.5.0
        with:
          version: 1.24.0
          arguments: deploy
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.v.outputs.version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_NEXUS2_SNAPSHOTS_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_NEXUS2_SNAPSHOTS_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_PASSWORD }}

      - name: Upload JReleaser logs
        if: always() && steps.v.outputs.is_snapshot == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jreleaser-snapshot-logs
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
          if-no-files-found: warn
